<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14B8A6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="90" cy="90" r="90" fill="#0F172A"/>
  
  <!-- Gradient border circle -->
  <circle cx="90" cy="90" r="85" fill="none" stroke="url(#grad1)" stroke-width="3"/>
  
  <!-- Stylized "A" using geometric shapes -->
  <g fill="url(#grad1)">
    <!-- Left diagonal line of A -->
    <polygon points="50,130 75,40 85,40 55,130" />
    
    <!-- Right diagonal line of A -->
    <polygon points="95,40 120,130 110,130 85,40" />
    
    <!-- Horizontal bar of A -->
    <rect x="60" y="85" width="60" height="8" rx="4" />
  </g>
</svg>